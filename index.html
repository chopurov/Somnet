<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vector · надежный мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #1a1b1e;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 12px;
        }
        .app {
            max-width: 1400px;
            width: 100%;
            height: 94vh;
            background: #2b2d31;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            display: flex;
            overflow: hidden;
            border: 1px solid #3d3f45;
        }
        .sidebar {
            width: 76px;
            background: #1e1f22;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 14px;
            border-right: 1px solid #2b2d31;
        }
        .nav-icon {
            width: 52px;
            height: 52px;
            background: #2b2d31;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #dbdee1;
            font-weight: 600;
            font-size: 24px;
            transition: 0.15s;
            cursor: pointer;
            border: 1px solid #3d3f45;
        }
        .nav-icon:hover { border-radius: 18px; background: #5865f2; color: white; border-color: #5865f2; }
        .nav-icon.active { background: #5865f2; color: white; border-radius: 18px; }
        .divider {
            width: 36px;
            height: 2px;
            background: #2b2d31;
            border-radius: 1px;
            margin: 8px 0;
        }
        .friends-panel {
            width: 290px;
            background: #2b2d31;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #202225;
        }
        .panel-header {
            padding: 20px 18px 10px;
            font-weight: 600;
            color: #f2f3f5;
            border-bottom: 1px solid #202225;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            background: #5865f2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            text-transform: uppercase;
        }
        .user-name {
            font-size: 15px;
            color: white;
        }
        .user-tag {
            font-size: 11px;
            color: #a5a9b2;
        }
        .search-box {
            margin: 14px 16px;
            background: #1e1f22;
            border-radius: 10px;
            display: flex;
            align-items: center;
            padding: 0 8px;
            border: 1px solid #2b2d31;
        }
        .search-box input {
            background: transparent;
            border: none;
            padding: 10px 8px;
            color: #dbdee1;
            width: 100%;
            outline: none;
            font-size: 14px;
        }
        .friends-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px;
        }
        .friend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 2px;
            color: #dbdee1;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid transparent;
        }
        .friend-item:hover { background: #35373c; border-color: #404249; }
        .friend-avatar {
            width: 44px;
            height: 44px;
            background: #ed8796;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            flex-shrink: 0;
        }
        .friend-info {
            flex: 1;
            overflow: hidden;
        }
        .friend-name {
            font-weight: 600;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .friend-tag {
            font-size: 12px;
            color: #949ba4;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #23a55a;
            margin-left: 4px;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #313338;
        }
        .chat-header {
            padding: 16px 22px;
            border-bottom: 1px solid #2b2d31;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #f2f3f5;
            background: #2b2d31;
        }
        .chat-info h3 { font-size: 18px; }
        .chat-info span { font-size: 13px; color: #a5a9b2; }
        .call-buttons {
            display: flex;
            gap: 12px;
            margin-left: auto;
        }
        .call-btn {
            background: #1e1f22;
            border: none;
            color: #dbdee1;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #404249;
        }
        .call-btn:hover { background: #404249; color: white; }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #313338;
        }
        .message {
            display: flex;
            gap: 14px;
            max-width: 80%;
        }
        .message.own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .msg-avatar {
            width: 42px;
            height: 42px;
            background: #8b5cf6;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
        }
        .msg-bubble {
            background: #2b2d31;
            padding: 12px 18px;
            border-radius: 20px;
            border-top-left-radius: 4px;
            color: #e1e5ea;
            font-size: 15px;
            word-break: break-word;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .message.own .msg-bubble {
            background: #5865f2;
            border-top-right-radius: 4px;
            border-top-left-radius: 20px;
            color: white;
        }
        .msg-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
            font-size: 13px;
        }
        .msg-author { font-weight: 600; }
        .msg-time { color: #a5a9b2; font-size: 11px; }
        .media-attachment {
            margin-top: 10px;
            border-radius: 14px;
            max-width: 280px;
            background: #1e1f22;
            padding: 8px;
        }
        .media-attachment img, video {
            max-width: 100%;
            border-radius: 10px;
            cursor: pointer;
        }
        .voice-message {
            background: #1e1f22;
            border-radius: 24px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .input-area {
            padding: 20px 22px;
            border-top: 1px solid #2b2d31;
            background: #313338;
        }
        .message-input-wrapper {
            background: #383a40;
            border-radius: 16px;
            display: flex;
            align-items: center;
            padding: 6px 10px;
            gap: 8px;
        }
        .attach-btn, .voice-note-btn {
            background: transparent;
            border: none;
            color: #b5bac1;
            font-size: 24px;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
        }
        .attach-btn:hover, .voice-note-btn:hover { background: #404249; color: white; }
        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 10px;
            color: #dbdee1;
            font-size: 15px;
            outline: none;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }
        .modal {
            background: #2b2d31;
            width: 440px;
            border-radius: 28px;
            padding: 28px;
            color: #f2f3f5;
            box-shadow: 0 25px 50px black;
            border: 1px solid #404249;
        }
        .modal h2 { margin-bottom: 22px; font-weight: 500; }
        .modal input {
            width: 100%;
            background: #1e1f22;
            border: 1px solid #3d3f45;
            padding: 15px 18px;
            border-radius: 16px;
            color: white;
            margin-bottom: 18px;
            font-size: 15px;
        }
        .modal button {
            background: #5865f2;
            border: none;
            color: white;
            padding: 16px;
            border-radius: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            font-size: 16px;
        }
        .modal button.secondary {
            background: #3d3f45;
            margin-top: 12px;
        }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #1e1f22; color: white; padding: 14px 28px;
            border-radius: 60px; font-size: 15px; z-index: 3000;
            border: 1px solid #5d6aff; box-shadow: 0 10px 20px black;
        }
        .hidden { display: none !important; }
        .badge {
            background: #f23f42; color: white; border-radius: 30px;
            padding: 3px 10px; font-size: 12px; margin-left: 8px;
        }
        .error-text {
            color: #f23f42;
            font-size: 13px;
            margin-top: -10px;
            margin-bottom: 15px;
        }
        .success-text {
            color: #23a55a;
            font-size: 13px;
            margin-top: -10px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="sidebar">
        <div class="nav-icon" id="homeBtn" title="Главная">⌂</div>
        <div class="nav-icon" id="addFriendIcon" title="Добавить друга">+</div>
        <div class="nav-icon" id="profileIcon" title="Профиль / заявки">👤</div>
        <div class="divider"></div>
        <div class="nav-icon" id="logoutIcon" title="Выйти">↪</div>
    </div>

    <div class="friends-panel" id="friendsPanel">
        <div class="panel-header">
            <div class="user-profile" id="currentUserProfile">
                <div class="user-avatar" id="currentUserAvatar">?</div>
                <div>
                    <div class="user-name" id="currentUserName">Гость</div>
                    <div class="user-tag" id="currentUserTag">#0000</div>
                </div>
            </div>
            <span class="badge hidden" id="requestBadge">0</span>
        </div>
        <div class="search-box"><input type="text" placeholder="Поиск друзей" id="searchFriends"></div>
        <div class="friends-list" id="friendsList"></div>
    </div>

    <div class="chat-area">
        <div class="chat-header" id="chatHeader">
            <div class="chat-info">
                <h3 id="currentChatName">#vector</h3>
                <span id="currentChatTag"></span>
            </div>
            <div class="call-buttons">
                <button class="call-btn" id="voiceCallBtn" title="Голосовой звонок">📞</button>
                <button class="call-btn" id="videoCallBtn" title="Видеозвонок">📹</button>
            </div>
        </div>

        <div class="messages-container" id="messageContainer"></div>

        <div class="input-area">
            <div class="message-input-wrapper">
                <button class="attach-btn" id="attachMediaBtn" title="Прикрепить фото/видео">📎</button>
                <input type="file" id="fileInput" accept="image/*,video/*" style="display:none;">
                <input type="text" class="message-input" placeholder="Сообщение..." id="messageInput">
                <button class="voice-note-btn" id="startVoiceNote" title="Голосовое">🎤</button>
            </div>
        </div>
    </div>
</div>

<!-- Модалка регистрации/входа -->
<div id="authModal" class="modal-overlay">
    <div class="modal">
        <h2>⚡ Регистрация / Вход</h2>
        <input type="text" id="regUsername" placeholder="Имя" value="Игрок">
        <input type="text" id="regTag" placeholder="Тег (4 цифры)" value="1234" maxlength="4">
        <p style="margin-bottom: 8px;">Ваш ID: <span id="displayTagPreview">Игрок#1234</span></p>
        <div id="regError" class="error-text hidden"></div>
        <button id="registerBtn">Войти / Создать</button>
        <button class="secondary" id="guestContinue">Продолжить как гость</button>
    </div>
</div>

<!-- Модалка добавления друга -->
<div id="addFriendModal" class="modal-overlay hidden">
    <div class="modal">
        <h2>➕ Добавить друга</h2>
        <input type="text" id="friendTagInput" placeholder="Введите тег (Пример#1234)">
        <div id="friendSearchResult" class="error-text hidden"></div>
        <button id="sendFriendRequestBtn">Отправить запрос</button>
        <button class="secondary" id="closeAddFriendModal">Отмена</button>
    </div>
</div>

<!-- Модалка входящих заявок -->
<div id="requestsModal" class="modal-overlay hidden">
    <div class="modal">
        <h2>📨 Входящие заявки</h2>
        <div id="incomingRequestsList" style="min-height:100px; max-height:250px; overflow-y:auto; margin-bottom:20px;"></div>
        <button class="secondary" id="closeRequestsModal">Закрыть</button>
    </div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
    (function() {
        // ----- Хранилище в localStorage -----
        const STORAGE_KEY = 'vector_messenger_v2';
        let data = {
            users: {},          // fullTag -> { name, tag, fullTag, friends: [], incoming: [], outgoing: [] }
            messages: {},       // "fullTag1_fullTag2" -> [{ from, text, media, time }]
            currentUser: null   // fullTag текущего пользователя
        };

        // Загрузка из localStorage
        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    data = parsed;
                } catch (e) { console.warn("Ошибка загрузки"); }
            }
            if (!data.users) data.users = {};
            if (!data.messages) data.messages = {};
            
            // Добавляем тестовых пользователей, если их нет (для демо)
            if (Object.keys(data.users).length === 0) {
                data.users['Алиса#1234'] = { 
                    name: 'Алиса', 
                    tag: '1234', 
                    fullTag: 'Алиса#1234', 
                    friends: [], 
                    incoming: [], 
                    outgoing: [] 
                };
                data.users['Борис#5678'] = { 
                    name: 'Борис', 
                    tag: '5678', 
                    fullTag: 'Борис#5678', 
                    friends: [], 
                    incoming: [], 
                    outgoing: [] 
                };
                data.users['Виктор#9012'] = { 
                    name: 'Виктор', 
                    tag: '9012', 
                    fullTag: 'Виктор#9012', 
                    friends: [], 
                    incoming: [], 
                    outgoing: [] 
                };
            }
        }
        
        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }
        
        loadData();

        // ----- Текущий пользователь -----
        let currentUser = data.currentUser ? data.users[data.currentUser] : null;
        let selectedChatFriend = null;

        // ----- Всплывающие уведомления -----
        function showToast(msg, duration=2000) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), duration);
        }

        // ----- Обновить интерфейс -----
        function refreshUI() {
            if (currentUser) {
                document.getElementById('currentUserName').innerText = currentUser.name;
                document.getElementById('currentUserTag').innerText = currentUser.fullTag;
                document.getElementById('currentUserAvatar').innerText = currentUser.name.charAt(0).toUpperCase();
                document.getElementById('authModal').classList.add('hidden');
            } else {
                document.getElementById('currentUserName').innerText = 'Гость';
                document.getElementById('currentUserTag').innerText = 'не авторизован';
                document.getElementById('currentUserAvatar').innerText = '?';
                document.getElementById('authModal').classList.remove('hidden');
            }
            
            const badge = document.getElementById('requestBadge');
            if (currentUser && currentUser.incoming && currentUser.incoming.length > 0) {
                badge.classList.remove('hidden');
                badge.innerText = currentUser.incoming.length;
            } else {
                badge.classList.add('hidden');
            }
            
            renderFriendsList();
            renderMessages();
        }

        // ----- Список друзей -----
        function renderFriendsList() {
            const container = document.getElementById('friendsList');
            if (!currentUser) {
                container.innerHTML = '<div style="color:#777; padding:20px;">Войдите в профиль</div>';
                return;
            }
            
            const friends = currentUser.friends || [];
            if (friends.length === 0) {
                container.innerHTML = '<div style="color:#777; padding:20px;">Друзей нет. Нажмите "+" чтобы добавить.</div>';
                return;
            }
            
            let html = '';
            friends.forEach(fullTag => {
                const friend = data.users[fullTag];
                if (!friend) return;
                const initial = friend.name.charAt(0).toUpperCase();
                html += `<div class="friend-item" data-tag="${fullTag}">
                    <div class="friend-avatar">${initial}</div>
                    <div class="friend-info">
                        <div class="friend-name">${friend.name}</div>
                        <div class="friend-tag">${fullTag}</div>
                    </div>
                    <div class="status-dot"></div>
                </div>`;
            });
            
            container.innerHTML = html;
            document.querySelectorAll('.friend-item').forEach(el => {
                el.addEventListener('click', () => {
                    selectChat(el.dataset.tag);
                });
            });
        }

        function selectChat(fullTag) {
            selectedChatFriend = fullTag;
            const friend = data.users[fullTag];
            document.getElementById('currentChatName').innerText = friend ? friend.name : 'Чат';
            document.getElementById('currentChatTag').innerText = friend ? fullTag : '';
            renderMessages();
        }

        // ----- Сообщения -----
        function getChatKey(userA, userB) {
            return [userA, userB].sort().join('_');
        }

        function renderMessages() {
            const container = document.getElementById('messageContainer');
            if (!currentUser || !selectedChatFriend) {
                container.innerHTML = '<div style="color:#777; align-self:center; margin-top:50px;">Выберите друга для общения</div>';
                return;
            }
            
            const key = getChatKey(currentUser.fullTag, selectedChatFriend);
            const chatMessages = data.messages[key] || [];
            
            if (chatMessages.length === 0) {
                container.innerHTML = '<div style="color:#777; align-self:center;">Напишите первое сообщение</div>';
                return;
            }
            
            let html = '';
            chatMessages.forEach(msg => {
                const isOwn = (msg.from === currentUser.fullTag);
                const authorName = isOwn ? currentUser.name : (data.users[selectedChatFriend]?.name || 'User');
                const avatarLetter = authorName.charAt(0).toUpperCase();
                
                let mediaHtml = '';
                if (msg.media) {
                    if (msg.media.type === 'image') {
                        mediaHtml = `<div class="media-attachment"><img src="${msg.media.url}" alt="photo" onclick="window.open('${msg.media.url}')"></div>`;
                    } else if (msg.media.type === 'video') {
                        mediaHtml = `<div class="media-attachment"><video src="${msg.media.url}" controls style="max-width:200px;"></video></div>`;
                    } else if (msg.media.type === 'voice') {
                        mediaHtml = `<div class="voice-message"><span>🎤</span><div class="voice-progress" style="width:100px; height:5px; background:#3d3f45;"></div><span>${msg.media.duration || '0:30'}</span></div>`;
                    }
                }
                
                html += `<div class="message ${isOwn ? 'own' : ''}">
                    <div class="msg-avatar">${avatarLetter}</div>
                    <div class="msg-bubble">
                        <div class="msg-meta">
                            <span class="msg-author">${authorName}</span>
                            <span class="msg-time">${msg.time || 'только что'}</span>
                        </div>
                        ${msg.text ? `<div>${msg.text}</div>` : ''}
                        ${mediaHtml}
                    </div>
                </div>`;
            });
            
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        // ----- Отправка сообщения -----
        function sendMessage(text, media = null) {
            if (!currentUser || !selectedChatFriend) {
                showToast('Выберите собеседника');
                return;
            }
            
            const key = getChatKey(currentUser.fullTag, selectedChatFriend);
            if (!data.messages[key]) data.messages[key] = [];
            
            const msg = {
                from: currentUser.fullTag,
                text: text || '',
                media: media,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };
            
            data.messages[key].push(msg);
            saveData();
            renderMessages();
        }

        // ----- Прикрепить файл -----
        document.getElementById('attachMediaBtn').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });
        
        document.getElementById('fileInput').addEventListener('change', function(e) {
            if (!this.files.length || !currentUser || !selectedChatFriend) {
                showToast('Выберите получателя');
                return;
            }
            
            const file = this.files[0];
            const reader = new FileReader();
            
            reader.onload = (event) => {
                const base64 = event.target.result;
                const type = file.type.startsWith('image/') ? 'image' : 
                            (file.type.startsWith('video/') ? 'video' : null);
                
                if (!type) { 
                    showToast('Только фото/видео'); 
                    return; 
                }
                
                sendMessage('', { type: type, url: base64 });
                showToast('Файл прикреплён');
            };
            
            reader.readAsDataURL(file);
            this.value = '';
        });

        // ----- Текстовое сообщение -----
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                sendMessage(e.target.value.trim());
                e.target.value = '';
            }
        });

        // ----- Регистрация с проверкой уникальности -----
        document.getElementById('registerBtn').addEventListener('click', () => {
            const name = document.getElementById('regUsername').value.trim();
            if (!name) {
                document.getElementById('regError').innerText = 'Введите имя';
                document.getElementById('regError').classList.remove('hidden');
                return;
            }
            
            let tag = document.getElementById('regTag').value.trim().replace('#','');
            if (!tag || tag.length !== 4 || !/^\d+$/.test(tag)) {
                document.getElementById('regError').innerText = 'Тег должен быть 4 цифры';
                document.getElementById('regError').classList.remove('hidden');
                return;
            }
            
            const fullTag = `${name}#${tag}`;
            
            // Проверяем, существует ли уже такой пользователь
            if (data.users[fullTag]) {
                // Пользователь существует - входим
                currentUser = data.users[fullTag];
                data.currentUser = fullTag;
                saveData();
                showToast(`С возвращением, ${name}`);
                refreshUI();
            } else {
                // Создаем нового пользователя
                const newUser = { 
                    name, 
                    tag, 
                    fullTag, 
                    friends: [], 
                    incoming: [], 
                    outgoing: [] 
                };
                data.users[fullTag] = newUser;
                currentUser = newUser;
                data.currentUser = fullTag;
                saveData();
                showToast(`Добро пожаловать, ${name}`);
                refreshUI();
            }
            
            document.getElementById('regError').classList.add('hidden');
        });

        document.getElementById('guestContinue').addEventListener('click', () => {
            const guestName = 'Гость_' + Math.floor(Math.random()*1000);
            const tag = String(Math.floor(Math.random()*9000+1000)).padStart(4, '0');
            const fullTag = `${guestName}#${tag}`;
            
            // Гости всегда уникальны благодаря случайному числу
            data.users[fullTag] = { 
                name: guestName, 
                tag, 
                fullTag, 
                friends: [], 
                incoming: [], 
                outgoing: [] 
            };
            
            currentUser = data.users[fullTag];
            data.currentUser = fullTag;
            saveData();
            showToast('Временный профиль создан');
            refreshUI();
        });

        // ----- Добавление друга с проверкой существования -----
        document.getElementById('addFriendIcon').addEventListener('click', () => {
            if (!currentUser) { 
                showToast('Сначала войдите'); 
                return; 
            }
            document.getElementById('friendTagInput').value = '';
            document.getElementById('friendSearchResult').classList.add('hidden');
            document.getElementById('addFriendModal').classList.remove('hidden');
        });
        
        document.getElementById('closeAddFriendModal').addEventListener('click', () => {
            document.getElementById('addFriendModal').classList.add('hidden');
        });
        
        document.getElementById('sendFriendRequestBtn').addEventListener('click', () => {
            const targetTag = document.getElementById('friendTagInput').value.trim();
            const resultDiv = document.getElementById('friendSearchResult');
            
            // Валидация формата
            if (!targetTag.includes('#')) { 
                resultDiv.innerText = '❌ Неверный формат. Используйте: Имя#1234';
                resultDiv.classList.remove('hidden');
                return;
            }
            
            const targetUser = data.users[targetTag];
            
            // Проверка существования пользователя
            if (!targetUser) { 
                resultDiv.innerText = '❌ Пользователь не найден';
                resultDiv.classList.remove('hidden');
                return;
            }
            
            // Проверка на самого себя
            if (targetTag === currentUser.fullTag) { 
                resultDiv.innerText = '❌ Нельзя добавить самого себя';
                resultDiv.classList.remove('hidden');
                return;
            }
            
            // Проверка на уже в друзьях
            if (currentUser.friends.includes(targetTag)) { 
                resultDiv.innerText = '❌ Уже в друзьях';
                resultDiv.classList.remove('hidden');
                return;
            }
            
            // Проверка на уже отправленный запрос
            if (currentUser.outgoing?.includes(targetTag)) { 
                resultDiv.innerText = '❌ Запрос уже отправлен';
                resultDiv.classList.remove('hidden');
                return;
            }
            
            // Все проверки пройдены - отправляем запрос
            if (!currentUser.outgoing) currentUser.outgoing = [];
            if (!targetUser.incoming) targetUser.incoming = [];
            
            currentUser.outgoing.push(targetTag);
            targetUser.incoming.push(currentUser.fullTag);
            
            saveData();
            showToast(`✅ Запрос отправлен ${targetTag}`);
            document.getElementById('addFriendModal').classList.add('hidden');
            refreshUI();
        });

        // ----- Профиль / заявки -----
        document.getElementById('profileIcon').addEventListener('click', () => {
            if (!currentUser) {
                showToast('Сначала войдите');
                return;
            }
            
            const incoming = currentUser.incoming || [];
            if (incoming.length === 0) {
                showToast('Нет входящих заявок');
                return;
            }
            
            const listDiv = document.getElementById('incomingRequestsList');
            listDiv.innerHTML = '';
            
            incoming.forEach(fullTag => {
                const reqUser = data.users[fullTag];
                if (!reqUser) return;
                
                const div = document.createElement('div');
                div.style.display = 'flex';
                div.style.justifyContent = 'space-between';
                div.style.alignItems = 'center';
                div.style.marginBottom = '12px';
                div.style.padding = '8px';
                div.style.background = '#1e1f22';
                div.style.borderRadius = '10px';
                
                div.innerHTML = `
                    <span><strong>${reqUser.name}</strong> (${fullTag})</span>
                    <button style="background:#23a55a; border:none; color:white; border-radius:30px; padding:8px 16px; cursor:pointer;" data-accept="${fullTag}">✔ Принять</button>
                `;
                
                listDiv.appendChild(div);
                
                div.querySelector('button').addEventListener('click', (e) => {
                    e.stopPropagation();
                    acceptRequest(fullTag);
                });
            });
            
            document.getElementById('requestsModal').classList.remove('hidden');
        });

        function acceptRequest(requesterTag) {
            if (!currentUser) return;
            
            const other = data.users[requesterTag];
            if (!other) return;
            
            // Добавляем в друзья обоим
            if (!currentUser.friends.includes(requesterTag)) {
                currentUser.friends.push(requesterTag);
            }
            if (!other.friends.includes(currentUser.fullTag)) {
                other.friends.push(currentUser.fullTag);
            }
            
            // Удаляем из входящих и исходящих
            currentUser.incoming = (currentUser.incoming || []).filter(r => r !== requesterTag);
            if (other.outgoing) {
                other.outgoing = other.outgoing.filter(r => r !== currentUser.fullTag);
            }
            
            saveData();
            showToast(`✅ Вы приняли заявку от ${requesterTag}`);
            document.getElementById('requestsModal').classList.add('hidden');
            refreshUI();
        }

        document.getElementById('closeRequestsModal').addEventListener('click', () => {
            document.getElementById('requestsModal').classList.add('hidden');
        });

        // ----- Выход -----
        document.getElementById('logoutIcon').addEventListener('click', () => {
            currentUser = null;
            data.currentUser = null;
            saveData();
            selectedChatFriend = null;
            refreshUI();
            showToast('Вы вышли');
        });

        // ----- Имитация звонков и голосовых -----
        document.getElementById('voiceCallBtn').addEventListener('click', () => {
            if (!selectedChatFriend) { 
                showToast('Выберите друга'); 
                return; 
            }
            showToast(`📞 Звонок ${selectedChatFriend} (демо)`);
        });
        
        document.getElementById('videoCallBtn').addEventListener('click', () => {
            if (!selectedChatFriend) { 
                showToast('Выберите друга'); 
                return; 
            }
            showToast(`📹 Видеозвонок для ${selectedChatFriend} (демо)`);
        });
        
        document.getElementById('startVoiceNote').addEventListener('click', () => {
            if (!currentUser || !selectedChatFriend) {
                showToast('Выберите получателя');
                return;
            }
            sendMessage('', { type: 'voice', duration: '0:15' });
            showToast('🎤 Голосовое сообщение отправлено');
        });

        // ----- Домой -----
        document.getElementById('homeBtn').addEventListener('click', () => {
            selectedChatFriend = null;
            document.getElementById('currentChatName').innerText = '#vector';
            document.getElementById('currentChatTag').innerText = '';
            renderMessages();
        });

        // ----- Поиск друзей -----
        document.getElementById('searchFriends').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('.friend-item').forEach(el => {
                const name = el.querySelector('.friend-name')?.innerText.toLowerCase() || '';
                const tag = el.dataset.tag.toLowerCase();
                el.style.display = (name.includes(query) || tag.includes(query)) ? 'flex' : 'none';
            });
        });

        // ----- Превью тега -----
        function updateTagPreview() {
            const name = document.getElementById('regUsername').value || 'Игрок';
            const tag = (document.getElementById('regTag').value || '0000').padStart(4, '0').slice(0,4);
            document.getElementById('displayTagPreview').innerText = `${name}#${tag}`;
        }
        
        document.getElementById('regUsername').addEventListener('input', updateTagPreview);
        document.getElementById('regTag').addEventListener('input', updateTagPreview);
        updateTagPreview();

        // ----- Инициализация -----
        refreshUI();
        if (!currentUser) {
            document.getElementById('authModal').classList.remove('hidden');
        }
    })();
</script>
</body>
</html>
