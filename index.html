<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vector · надежный мессенджер с друзьями</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #1a1b1e;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 12px;
        }
        .app {
            max-width: 1400px;
            width: 100%;
            height: 94vh;
            background: #2b2d31;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            display: flex;
            overflow: hidden;
            border: 1px solid #3d3f45;
        }
        .sidebar {
            width: 76px;
            background: #1e1f22;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 14px;
            border-right: 1px solid #2b2d31;
        }
        .nav-icon {
            width: 52px;
            height: 52px;
            background: #2b2d31;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #dbdee1;
            font-weight: 600;
            font-size: 24px;
            transition: 0.15s;
            cursor: pointer;
            border: 1px solid #3d3f45;
        }
        .nav-icon:hover { border-radius: 18px; background: #5865f2; color: white; border-color: #5865f2; }
        .divider {
            width: 36px;
            height: 2px;
            background: #2b2d31;
            border-radius: 1px;
            margin: 8px 0;
        }
        .friends-panel {
            width: 290px;
            background: #2b2d31;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #202225;
        }
        .panel-header {
            padding: 20px 18px 10px;
            font-weight: 600;
            color: #f2f3f5;
            border-bottom: 1px solid #202225;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
        }
        .user-profile:hover {
            background: #35373c;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            background: #5865f2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            text-transform: uppercase;
        }
        .user-name {
            font-size: 15px;
            color: white;
            font-weight: 500;
        }
        .user-tag {
            font-size: 11px;
            color: #a5a9b2;
        }
        .search-box {
            margin: 14px 16px;
            background: #1e1f22;
            border-radius: 10px;
            display: flex;
            align-items: center;
            padding: 0 8px;
            border: 1px solid #2b2d31;
        }
        .search-box input {
            background: transparent;
            border: none;
            padding: 10px 8px;
            color: #dbdee1;
            width: 100%;
            outline: none;
            font-size: 14px;
        }
        .friends-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px;
        }
        .friend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 2px;
            color: #dbdee1;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid transparent;
        }
        .friend-item:hover { background: #35373c; border-color: #404249; }
        .friend-avatar {
            width: 44px;
            height: 44px;
            background: #ed8796;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            flex-shrink: 0;
        }
        .friend-info {
            flex: 1;
            overflow: hidden;
        }
        .friend-name {
            font-weight: 600;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .friend-tag {
            font-size: 12px;
            color: #949ba4;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #23a55a;
            margin-left: 4px;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #313338;
        }
        .chat-header {
            padding: 16px 22px;
            border-bottom: 1px solid #2b2d31;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #f2f3f5;
            background: #2b2d31;
        }
        .chat-info h3 { font-size: 18px; }
        .chat-info span { font-size: 13px; color: #a5a9b2; }
        .call-buttons {
            display: flex;
            gap: 12px;
            margin-left: auto;
        }
        .call-btn {
            background: #1e1f22;
            border: none;
            color: #dbdee1;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #404249;
        }
        .call-btn:hover { background: #404249; color: white; }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #313338;
        }
        .message {
            display: flex;
            gap: 14px;
            max-width: 80%;
        }
        .message.own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .msg-avatar {
            width: 42px;
            height: 42px;
            background: #8b5cf6;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
        }
        .msg-bubble {
            background: #2b2d31;
            padding: 12px 18px;
            border-radius: 20px;
            border-top-left-radius: 4px;
            color: #e1e5ea;
            font-size: 15px;
            word-break: break-word;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .message.own .msg-bubble {
            background: #5865f2;
            border-top-right-radius: 4px;
            border-top-left-radius: 20px;
            color: white;
        }
        .msg-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
            font-size: 13px;
        }
        .msg-author { font-weight: 600; }
        .msg-time { color: #a5a9b2; font-size: 11px; }
        .media-attachment {
            margin-top: 10px;
            border-radius: 14px;
            max-width: 280px;
            background: #1e1f22;
            padding: 8px;
        }
        .media-attachment img, video {
            max-width: 100%;
            border-radius: 10px;
            cursor: pointer;
        }
        .voice-message {
            background: #1e1f22;
            border-radius: 24px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .input-area {
            padding: 20px 22px;
            border-top: 1px solid #2b2d31;
            background: #313338;
        }
        .message-input-wrapper {
            background: #383a40;
            border-radius: 16px;
            display: flex;
            align-items: center;
            padding: 6px 10px;
            gap: 8px;
        }
        .attach-btn, .voice-note-btn {
            background: transparent;
            border: none;
            color: #b5bac1;
            font-size: 24px;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
        }
        .attach-btn:hover, .voice-note-btn:hover { background: #404249; color: white; }
        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 10px;
            color: #dbdee1;
            font-size: 15px;
            outline: none;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }
        .modal {
            background: #2b2d31;
            width: 440px;
            border-radius: 28px;
            padding: 28px;
            color: #f2f3f5;
            box-shadow: 0 25px 50px black;
            border: 1px solid #404249;
        }
        .modal h2 { margin-bottom: 22px; font-weight: 500; }
        .modal input {
            width: 100%;
            background: #1e1f22;
            border: 1px solid #3d3f45;
            padding: 15px 18px;
            border-radius: 16px;
            color: white;
            margin-bottom: 18px;
            font-size: 15px;
        }
        .modal button {
            background: #5865f2;
            border: none;
            color: white;
            padding: 16px;
            border-radius: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 8px;
        }
        .modal button.secondary {
            background: #3d3f45;
            margin-top: 0;
        }
        .modal button.danger {
            background: #f23f42;
        }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #1e1f22; color: white; padding: 14px 28px;
            border-radius: 60px; font-size: 15px; z-index: 3000;
            border: 1px solid #5d6aff; box-shadow: 0 10px 20px black;
        }
        .hidden { display: none !important; }
        .badge {
            background: #f23f42; color: white; border-radius: 30px;
            padding: 3px 10px; font-size: 12px; margin-left: 8px;
            font-weight: bold;
        }
        .search-result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #1e1f22;
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .add-friend-btn {
            background: #23a55a;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
        }
        .add-friend-btn:hover { background: #1e8b4c; }
        .friend-request-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #1e1f22;
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .accept-btn {
            background: #23a55a;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            margin-right: 8px;
        }
        .reject-btn {
            background: #f23f42;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
        }
        .info-text {
            color: #a5a9b2;
            font-size: 14px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="sidebar">
        <div class="nav-icon" id="homeBtn" title="Главная">⌂</div>
        <div class="nav-icon" id="addFriendIcon" title="Найти друзей">+</div>
        <div class="nav-icon" id="friendRequestsIcon" title="Заявки в друзья">📨</div>
        <div class="divider"></div>
        <div class="nav-icon" id="logoutIcon" title="Выйти">↪</div>
    </div>

    <div class="friends-panel" id="friendsPanel">
        <div class="panel-header">
            <div class="user-profile" id="currentUserProfile">
                <div class="user-avatar" id="currentUserAvatar">?</div>
                <div>
                    <div class="user-name" id="currentUserName">Гость</div>
                    <div class="user-tag" id="currentUserTag"></div>
                </div>
            </div>
            <span class="badge hidden" id="requestBadge">0</span>
        </div>
        <div class="search-box">
            <input type="text" placeholder="Поиск среди друзей" id="searchFriends">
        </div>
        <div class="friends-list" id="friendsList"></div>
    </div>

    <div class="chat-area">
        <div class="chat-header" id="chatHeader">
            <div class="chat-info">
                <h3 id="currentChatName">#vector</h3>
                <span id="currentChatTag"></span>
            </div>
            <div class="call-buttons">
                <button class="call-btn" id="voiceCallBtn" title="Голосовой звонок">📞</button>
                <button class="call-btn" id="videoCallBtn" title="Видеозвонок">📹</button>
            </div>
        </div>

        <div class="messages-container" id="messageContainer"></div>

        <div class="input-area">
            <div class="message-input-wrapper">
                <button class="attach-btn" id="attachMediaBtn" title="Прикрепить фото/видео">📎</button>
                <input type="file" id="fileInput" accept="image/*,video/*" style="display:none;">
                <input type="text" class="message-input" placeholder="Напишите сообщение..." id="messageInput">
                <button class="voice-note-btn" id="startVoiceNote" title="Голосовое сообщение">🎤</button>
            </div>
        </div>
    </div>
</div>

<!-- Модалка регистрации/входа -->
<div id="authModal" class="modal-overlay">
    <div class="modal">
        <h2>⚡ Вход / Регистрация</h2>
        <input type="text" id="loginName" placeholder="Ваше имя" value="">
        <input type="password" id="loginPassword" placeholder="Пароль" value="">
        <div id="authError" class="info-text" style="color: #f23f42;"></div>
        <button id="loginBtn">Войти</button>
        <button class="secondary" id="registerBtn">Зарегистрироваться</button>
    </div>
</div>

<!-- Модалка поиска пользователей -->
<div id="searchUsersModal" class="modal-overlay hidden">
    <div class="modal">
        <h2>🔍 Поиск пользователей</h2>
        <input type="text" id="searchUserInput" placeholder="Введите имя для поиска">
        <button id="performSearchBtn">Найти</button>
        <div id="searchResults" style="max-height: 300px; overflow-y: auto; margin: 16px 0;"></div>
        <button class="secondary" id="closeSearchModal">Закрыть</button>
    </div>
</div>

<!-- Модалка входящих заявок -->
<div id="friendRequestsModal" class="modal-overlay hidden">
    <div class="modal">
        <h2>📨 Входящие заявки</h2>
        <div id="incomingRequestsList" style="max-height: 300px; overflow-y: auto; margin: 16px 0;"></div>
        <div id="outgoingRequestsList" style="max-height: 300px; overflow-y: auto; margin: 16px 0;"></div>
        <button class="secondary" id="closeRequestsModal">Закрыть</button>
    </div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
    (function() {
        // ----- База данных в localStorage -----
        const STORAGE_KEY = 'vector_messenger_v3';
        
        // Структура данных
        let data = {
            users: {},           // userId -> { id, name, password, tag, friends: [], incoming: [], outgoing: [], avatar: null }
            messages: {},        // "user1_user2" -> [{ fromId, text, media, time }]
            currentUserId: null  // ID текущего пользователя
        };

        // Загрузка из localStorage
        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    data = parsed;
                } catch (e) {
                    console.warn("Ошибка загрузки данных");
                }
            }
            
            // Инициализация структуры, если пусто
            if (!data.users) data.users = {};
            if (!data.messages) data.messages = {};
            
            // Добавляем тестовых пользователей, если база пуста
            if (Object.keys(data.users).length === 0) {
                createTestUser('Алиса', '123');
                createTestUser('Борис', '456');
                createTestUser('Виктор', '789');
            }
        }
        
        function createTestUser(name, password) {
            const tag = Math.floor(1000 + Math.random() * 9000);
            const userId = `${name}_${tag}`;
            data.users[userId] = {
                id: userId,
                name: name,
                password: password,
                tag: tag,
                friends: [],
                incoming: [],
                outgoing: [],
                avatar: null
            };
            return userId;
        }
        
        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }
        
        loadData();

        // ----- Текущий пользователь -----
        let currentUser = data.currentUserId ? data.users[data.currentUserId] : null;
        let selectedChatFriend = null; // ID друга для чата

        // ----- Вспомогательные функции -----
        function showToast(msg, duration = 2000) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), duration);
        }

        function refreshUI() {
            if (currentUser) {
                document.getElementById('currentUserName').innerText = currentUser.name;
                document.getElementById('currentUserTag').innerText = `#${currentUser.tag}`;
                document.getElementById('currentUserAvatar').innerText = currentUser.name.charAt(0).toUpperCase();
                document.getElementById('authModal').classList.add('hidden');
            } else {
                document.getElementById('currentUserName').innerText = 'Гость';
                document.getElementById('currentUserTag').innerText = '';
                document.getElementById('currentUserAvatar').innerText = '?';
            }
            
            // Обновление бейджа с количеством заявок
            const badge = document.getElementById('requestBadge');
            if (currentUser && currentUser.incoming && currentUser.incoming.length > 0) {
                badge.classList.remove('hidden');
                badge.innerText = currentUser.incoming.length;
            } else {
                badge.classList.add('hidden');
            }
            
            renderFriendsList();
            renderMessages();
        }

        // ----- Список друзей -----
        function renderFriendsList() {
            const container = document.getElementById('friendsList');
            if (!currentUser) {
                container.innerHTML = '<div style="color: #777; padding: 20px;">Войдите в профиль</div>';
                return;
            }
            
            const friends = currentUser.friends || [];
            if (friends.length === 0) {
                container.innerHTML = '<div style="color: #777; padding: 20px;">У вас пока нет друзей. Нажмите "+" чтобы найти людей.</div>';
                return;
            }
            
            let html = '';
            friends.forEach(friendId => {
                const friend = data.users[friendId];
                if (!friend) return;
                
                html += `<div class="friend-item" data-id="${friendId}">
                    <div class="friend-avatar">${friend.name.charAt(0).toUpperCase()}</div>
                    <div class="friend-info">
                        <div class="friend-name">${friend.name}</div>
                        <div class="friend-tag">#${friend.tag}</div>
                    </div>
                    <div class="status-dot"></div>
                </div>`;
            });
            
            container.innerHTML = html;
            
            // Добавляем обработчики кликов на друзей
            document.querySelectorAll('.friend-item').forEach(el => {
                el.addEventListener('click', () => {
                    selectChat(el.dataset.id);
                });
            });
        }

        function selectChat(friendId) {
            selectedChatFriend = friendId;
            const friend = data.users[friendId];
            if (friend) {
                document.getElementById('currentChatName').innerText = friend.name;
                document.getElementById('currentChatTag').innerText = `#${friend.tag}`;
            }
            renderMessages();
        }

        // ----- Сообщения -----
        function getChatKey(userA, userB) {
            return [userA, userB].sort().join('_');
        }

        function renderMessages() {
            const container = document.getElementById('messageContainer');
            if (!currentUser || !selectedChatFriend) {
                container.innerHTML = '<div style="color: #777; align-self: center; margin-top: 50px;">Выберите друга для общения</div>';
                return;
            }
            
            const key = getChatKey(currentUser.id, selectedChatFriend);
            const chatMessages = data.messages[key] || [];
            
            if (chatMessages.length === 0) {
                container.innerHTML = '<div style="color: #777; align-self: center;">Напишите первое сообщение</div>';
                return;
            }
            
            let html = '';
            chatMessages.forEach(msg => {
                const isOwn = (msg.fromId === currentUser.id);
                const author = data.users[msg.fromId];
                if (!author) return;
                
                let mediaHtml = '';
                if (msg.media) {
                    if (msg.media.type === 'image') {
                        mediaHtml = `<div class="media-attachment"><img src="${msg.media.url}" alt="photo" onclick="window.open('${msg.media.url}')"></div>`;
                    } else if (msg.media.type === 'video') {
                        mediaHtml = `<div class="media-attachment"><video src="${msg.media.url}" controls style="max-width: 200px;"></video></div>`;
                    } else if (msg.media.type === 'voice') {
                        mediaHtml = `<div class="voice-message"><span>🎤</span><div style="width: 100px; height: 5px; background: #3d3f45; border-radius: 3px;"></div><span>${msg.media.duration || '0:30'}</span></div>`;
                    }
                }
                
                html += `<div class="message ${isOwn ? 'own' : ''}">
                    <div class="msg-avatar">${author.name.charAt(0).toUpperCase()}</div>
                    <div class="msg-bubble">
                        <div class="msg-meta">
                            <span class="msg-author">${author.name}</span>
                            <span class="msg-time">${msg.time || 'только что'}</span>
                        </div>
                        ${msg.text ? `<div>${msg.text}</div>` : ''}
                        ${mediaHtml}
                    </div>
                </div>`;
            });
            
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage(text, media = null) {
            if (!currentUser || !selectedChatFriend) {
                showToast('Выберите собеседника');
                return;
            }
            
            const key = getChatKey(currentUser.id, selectedChatFriend);
            if (!data.messages[key]) data.messages[key] = [];
            
            const msg = {
                fromId: currentUser.id,
                text: text || '',
                media: media,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };
            
            data.messages[key].push(msg);
            saveData();
            renderMessages();
        }

        // ----- Регистрация и вход -----
        document.getElementById('registerBtn').addEventListener('click', () => {
            const name = document.getElementById('loginName').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorDiv = document.getElementById('authError');
            
            if (!name || !password) {
                errorDiv.innerText = 'Введите имя и пароль';
                return;
            }
            
            // Генерируем уникальный тег (4 цифры)
            let tag;
            let userId;
            let attempts = 0;
            do {
                tag = Math.floor(1000 + Math.random() * 9000);
                userId = `${name}_${tag}`;
                attempts++;
                if (attempts > 100) { // Защита от бесконечного цикла
                    errorDiv.innerText = 'Ошибка генерации тега';
                    return;
                }
            } while (data.users[userId]); // Проверяем, что такого пользователя еще нет
            
            // Создаем нового пользователя
            const newUser = {
                id: userId,
                name: name,
                password: password,
                tag: tag,
                friends: [],
                incoming: [],
                outgoing: [],
                avatar: null
            };
            
            data.users[userId] = newUser;
            currentUser = newUser;
            data.currentUserId = userId;
            saveData();
            
            errorDiv.innerText = '';
            showToast(`Добро пожаловать, ${name}! Ваш тег: #${tag}`);
            refreshUI();
        });

        document.getElementById('loginBtn').addEventListener('click', () => {
            const name = document.getElementById('loginName').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorDiv = document.getElementById('authError');
            
            if (!name || !password) {
                errorDiv.innerText = 'Введите имя и пароль';
                return;
            }
            
            // Ищем пользователя по имени и паролю
            let foundUser = null;
            for (const userId in data.users) {
                const user = data.users[userId];
                if (user.name === name && user.password === password) {
                    foundUser = user;
                    break;
                }
            }
            
            if (foundUser) {
                currentUser = foundUser;
                data.currentUserId = foundUser.id;
                saveData();
                errorDiv.innerText = '';
                showToast(`С возвращением, ${name}!`);
                refreshUI();
            } else {
                errorDiv.innerText = 'Неверное имя или пароль';
            }
        });

        // ----- Поиск пользователей и добавление в друзья -----
        document.getElementById('addFriendIcon').addEventListener('click', () => {
            if (!currentUser) {
                showToast('Сначала войдите');
                return;
            }
            document.getElementById('searchUserInput').value = '';
            document.getElementById('searchResults').innerHTML = '';
            document.getElementById('searchUsersModal').classList.remove('hidden');
        });

        document.getElementById('closeSearchModal').addEventListener('click', () => {
            document.getElementById('searchUsersModal').classList.add('hidden');
        });

        document.getElementById('performSearchBtn').addEventListener('click', () => {
            const query = document.getElementById('searchUserInput').value.trim().toLowerCase();
            const resultsDiv = document.getElementById('searchResults');
            
            if (!query) {
                resultsDiv.innerHTML = '<div class="info-text">Введите имя для поиска</div>';
                return;
            }
            
            // Ищем пользователей, чье имя содержит запрос
            const results = [];
            for (const userId in data.users) {
                const user = data.users[userId];
                if (user.id === currentUser.id) continue; // Исключаем себя
                if (user.name.toLowerCase().includes(query)) {
                    results.push(user);
                }
            }
            
            if (results.length === 0) {
                resultsDiv.innerHTML = '<div class="info-text">Пользователи не найдены</div>';
                return;
            }
            
            let html = '';
            results.forEach(user => {
                const isFriend = currentUser.friends.includes(user.id);
                const isOutgoing = currentUser.outgoing.includes(user.id);
                const isIncoming = currentUser.incoming.includes(user.id);
                
                let buttonHtml = '';
                if (isFriend) {
                    buttonHtml = '<button class="add-friend-btn" disabled style="background: #3d3f45;">✓ В друзьях</button>';
                } else if (isOutgoing) {
                    buttonHtml = '<button class="add-friend-btn" disabled style="background: #3d3f45;">⏳ Запрос отправлен</button>';
                } else if (isIncoming) {
                    buttonHtml = '<button class="add-friend-btn" style="background: #23a55a;" onclick="window.acceptFromSearch(\'' + user.id + '\')">✔ Принять заявку</button>';
                } else {
                    buttonHtml = `<button class="add-friend-btn" onclick="window.sendFriendRequest('${user.id}')">➕ Добавить</button>`;
                }
                
                html += `<div class="search-result-item">
                    <div>
                        <strong>${user.name}</strong> #${user.tag}
                    </div>
                    ${buttonHtml}
                </div>`;
            });
            
            resultsDiv.innerHTML = html;
        });

        // Функция отправки заявки в друзья
        window.sendFriendRequest = function(targetId) {
            const targetUser = data.users[targetId];
            if (!targetUser || !currentUser) return;
            
            // Проверки
            if (currentUser.friends.includes(targetId)) {
                showToast('Уже в друзьях');
                return;
            }
            if (currentUser.outgoing.includes(targetId)) {
                showToast('Запрос уже отправлен');
                return;
            }
            
            // Отправляем заявку
            if (!currentUser.outgoing) currentUser.outgoing = [];
            if (!targetUser.incoming) targetUser.incoming = [];
            
            currentUser.outgoing.push(targetId);
            targetUser.incoming.push(currentUser.id);
            
            saveData();
            showToast(`Заявка отправлена ${targetUser.name}`);
            
            // Обновляем результаты поиска
            document.getElementById('performSearchBtn').click();
            refreshUI();
        };

        // Принятие заявки из поиска
        window.acceptFromSearch = function(senderId) {
            const sender = data.users[senderId];
            if (!sender || !currentUser) return;
            
            // Добавляем в друзья обоим
            if (!currentUser.friends.includes(senderId)) {
                currentUser.friends.push(senderId);
            }
            if (!sender.friends.includes(currentUser.id)) {
                sender.friends.push(currentUser.id);
            }
            
            // Удаляем из входящих/исходящих
            currentUser.incoming = (currentUser.incoming || []).filter(id => id !== senderId);
            sender.outgoing = (sender.outgoing || []).filter(id => id !== currentUser.id);
            
            saveData();
            showToast(`Вы приняли заявку от ${sender.name}`);
            document.getElementById('performSearchBtn').click();
            refreshUI();
        };

        // ----- Просмотр и управление заявками -----
        document.getElementById('friendRequestsIcon').addEventListener('click', () => {
            if (!currentUser) {
                showToast('Сначала войдите');
                return;
            }
            
            updateRequestsModal();
            document.getElementById('friendRequestsModal').classList.remove('hidden');
        });

        document.getElementById('closeRequestsModal').addEventListener('click', () => {
            document.getElementById('friendRequestsModal').classList.add('hidden');
        });

        function updateRequestsModal() {
            if (!currentUser) return;
            
            const incomingDiv = document.getElementById('incomingRequestsList');
            const outgoingDiv = document.getElementById('outgoingRequestsList');
            
            // Входящие заявки
            const incoming = currentUser.incoming || [];
            if (incoming.length === 0) {
                incomingDiv.innerHTML = '<div class="info-text">Нет входящих заявок</div>';
            } else {
                let html = '<h3 style="margin-bottom: 10px;">Входящие:</h3>';
                incoming.forEach(senderId => {
                    const sender = data.users[senderId];
                    if (!sender) return;
                    
                    html += `<div class="friend-request-item">
                        <div>
                            <strong>${sender.name}</strong> #${sender.tag}
                        </div>
                        <div>
                            <button class="accept-btn" onclick="window.acceptRequest('${senderId}')">✔ Принять</button>
                            <button class="reject-btn" onclick="window.rejectRequest('${senderId}')">✖ Отклонить</button>
                        </div>
                    </div>`;
                });
                incomingDiv.innerHTML = html;
            }
            
            // Исходящие заявки
            const outgoing = currentUser.outgoing || [];
            if (outgoing.length === 0) {
                outgoingDiv.innerHTML = '<div class="info-text">Нет исходящих заявок</div>';
            } else {
                let html = '<h3 style="margin-bottom: 10px; margin-top: 20px;">Исходящие:</h3>';
                outgoing.forEach(targetId => {
                    const target = data.users[targetId];
                    if (!target) return;
                    
                    html += `<div class="friend-request-item">
                        <div>
                            <strong>${target.name}</strong> #${target.tag}
                        </div>
                        <div>
                            <button class="reject-btn" onclick="window.cancelRequest('${targetId}')">✖ Отменить</button>
                        </div>
                    </div>`;
                });
                outgoingDiv.innerHTML = html;
            }
        }

        // Принятие заявки
        window.acceptRequest = function(senderId) {
            const sender = data.users[senderId];
            if (!sender || !currentUser) return;
            
            // Добавляем в друзья
            if (!currentUser.friends.includes(senderId)) {
                currentUser.friends.push(senderId);
            }
            if (!sender.friends.includes(currentUser.id)) {
                sender.friends.push(currentUser.id);
            }
            
            // Удаляем из входящих/исходящих
            currentUser.incoming = (currentUser.incoming || []).filter(id => id !== senderId);
            sender.outgoing = (sender.outgoing || []).filter(id => id !== currentUser.id);
            
            saveData();
            showToast(`Вы приняли заявку от ${sender.name}`);
            updateRequestsModal();
            refreshUI();
        };

        // Отклонение заявки
        window.rejectRequest = function(senderId) {
            const sender = data.users[senderId];
            if (!sender || !currentUser) return;
            
            // Просто удаляем из входящих/исходящих
            currentUser.incoming = (currentUser.incoming || []).filter(id => id !== senderId);
            sender.outgoing = (sender.outgoing || []).filter(id => id !== currentUser.id);
            
            saveData();
            showToast(`Заявка отклонена`);
            updateRequestsModal();
            refreshUI();
        };

        // Отмена отправленной заявки
        window.cancelRequest = function(targetId) {
            const target = data.users[targetId];
            if (!target || !currentUser) return;
            
            // Удаляем из исходящих/входящих
            currentUser.outgoing = (currentUser.outgoing || []).filter(id => id !== targetId);
            target.incoming = (target.incoming || []).filter(id => id !== currentUser.id);
            
            saveData();
            showToast(`Заявка отменена`);
            updateRequestsModal();
            refreshUI();
        };

        // ----- Прикрепление файлов -----
        document.getElementById('attachMediaBtn').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });
        
        document.getElementById('fileInput').addEventListener('change', function(e) {
            if (!this.files.length || !currentUser || !selectedChatFriend) {
                showToast('Выберите получателя');
                return;
            }
            
            const file = this.files[0];
            const reader = new FileReader();
            
            reader.onload = (event) => {
                const base64 = event.target.result;
                const type = file.type.startsWith('image/') ? 'image' : 
                            (file.type.startsWith('video/') ? 'video' : null);
                
                if (!type) { 
                    showToast('Только фото/видео'); 
                    return; 
                }
                
                sendMessage('', { type: type, url: base64 });
                showToast('Файл прикреплен');
            };
            
            reader.readAsDataURL(file);
            this.value = '';
        });

        // ----- Отправка сообщения по Enter -----
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                sendMessage(e.target.value.trim());
                e.target.value = '';
            }
        });

        // ----- Голосовые сообщения (демо) -----
        document.getElementById('startVoiceNote').addEventListener('click', () => {
            if (!currentUser || !selectedChatFriend) {
                showToast('Выберите получателя');
                return;
            }
            sendMessage('', { type: 'voice', duration: '0:15' });
            showToast('🎤 Голосовое сообщение отправлено');
        });

        // ----- Звонки (демо) -----
        document.getElementById('voiceCallBtn').addEventListener('click', () => {
            if (!selectedChatFriend) { 
                showToast('Выберите друга'); 
                return; 
            }
            showToast(`📞 Звонок... (демо-режим)`);
        });
        
        document.getElementById('videoCallBtn').addEventListener('click', () => {
            if (!selectedChatFriend) { 
                showToast('Выберите друга'); 
                return; 
            }
            showToast(`📹 Видеозвонок... (демо-режим)`);
        });

        // ----- Выход -----
        document.getElementById('logoutIcon').addEventListener('click', () => {
            currentUser = null;
            data.currentUserId = null;
            saveData();
            selectedChatFriend = null;
            refreshUI();
            showToast('Вы вышли');
        });

        // ----- Домой (сброс выбора) -----
        document.getElementById('homeBtn').addEventListener('click', () => {
            selectedChatFriend = null;
            document.getElementById('currentChatName').innerText = '#vector';
            document.getElementById('currentChatTag').innerText = '';
            renderMessages();
        });

        // ----- Поиск по друзьям -----
        document.getElementById('searchFriends').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('.friend-item').forEach(el => {
                const name = el.querySelector('.friend-name')?.innerText.toLowerCase() || '';
                const tag = el.dataset.id.toLowerCase();
                el.style.display = (name.includes(query) || tag.includes(query)) ? 'flex' : 'none';
            });
        });

        // ----- Инициализация -----
        refreshUI();
        
        // Если нет пользователя, показываем модалку входа
        if (!currentUser) {
            document.getElementById('authModal').classList.remove('hidden');
        }
    })();
</script>
</body>
</html>
